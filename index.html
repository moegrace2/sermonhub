            <option value="web" ${studyState.translation==='web'?'selected':''}>WEB</option>
            <option value="webbe" ${studyState.translation==='webbe'?'selected':''}>WEBBE</option>
            <option value="oeb-us" ${studyState.translation==='oeb-us'?'selected':''}>OEB</option>
          </select>
        </div>
        <div class="reading-plan-bar">
          <button class="read-badge unread" id="read-chapter-btn" onclick="toggleChapterRead()">Mark Read</button>
          <div class="progress-bar-track"><div class="progress-bar-fill" id="study-prog-fill" style="width:0%"></div></div>
          <span id="study-prog-label" style="font-size:11px;color:var(--text-secondary);white-space:nowrap;">0 / ${TOTAL_CHAPTERS}</span>
        </div>
        <div class="verse-action-bar" id="verse-action-bar" style="display:none;">
          <span id="verse-action-ref" style="font-size:12px;font-weight:600;color:var(--primary);white-space:nowrap;"></span>
          <div style="display:flex;align-items:center;gap:5px;margin-left:4px;">
            <span style="font-size:11px;color:var(--text-secondary);">Highlight:</span>
            <div class="hl-dot hl-bg-yellow" onclick="applyHighlight('yellow')" title="Yellow"></div>
            <div class="hl-dot hl-bg-blue"   onclick="applyHighlight('blue')"   title="Blue"></div>
            <div class="hl-dot hl-bg-green"  onclick="applyHighlight('green')"  title="Green"></div>
            <div class="hl-dot hl-bg-pink"   onclick="applyHighlight('pink')"   title="Pink"></div>
            <div class="hl-dot" style="background:#eee;border:1.5px solid #ccc;font-size:11px;color:#888;" onclick="applyHighlight('none')" title="Remove">✕</div>
          </div>
          <button class="btn btn-primary" style="padding:5px 11px;font-size:12px;margin-left:4px;" onclick="annotateSelectedVerse()">+ Note</button>
          <button class="btn btn-ghost" style="padding:5px 11px;font-size:12px;" onclick="addVerseToSermon()">+ Sermon</button>
          <button class="btn btn-ghost" style="padding:5px 11px;font-size:12px;" onclick="openVerseResources()">Resources</button>
          <button onclick="clearVerseSelection()" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:0 4px;line-height:1;margin-left:auto;">×</button>
        </div>
        <div class="study-pane-body" id="study-bible-body"><div class="loading">Loading scripture…</div></div>
      </div>
      <div class="study-right">
        <div class="study-pane-header">
          <span id="study-notes-title" style="font-size:13px;font-weight:500;color:var(--text-primary);">Notes</span>
          <div style="margin-left:auto;display:flex;gap:5px;">
            <button class="study-tab active" id="tab-chapter" onclick="setStudyTab('chapter',this)">This Chapter</button>
            <button class="study-tab"        id="tab-all"     onclick="setStudyTab('all',this)">All Notes</button>
          </div>
        </div>
        <div class="study-pane-body" id="study-notes-body"><div class="loading">Loading…</div></div>
      </div>
    </div>`;

  const uid = currentUser.id;
  const [notesRes, hlRes, progRes] = await Promise.all([
    sb.from('study_notes').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
    sb.from('verse_highlights').select('*').eq('user_id', uid),
    sb.from('reading_progress').select('book,chapter').eq('user_id', uid)
  ]);

  cache.studyNotes = notesRes.data || [];
  studyState.readChapters = new Set((progRes.data||[]).map(r=>`${r.book}_${r.chapter}`));
  rebuildHighlightsMap(hlRes.data || []);
  updateStudyProgress();
  await loadStudyChapter();
  renderRightPane();
}

function filterNotes() {
  renderRightPane();
}

function openNoteDetail(id) {
  const n = cache.studyNotes.find(x => x.id === id); if (!n) return;
  const ref = [n.book, n.chapter ? n.chapter + (n.verse ? ':' + n.verse : '') : null].filter(Boolean).join(' ');
  showModal('default', ref || 'Study Note', `
    <div class="detail-content" style="font-size:15px;line-height:1.8;">${esc(n.note)}</div>
    ${n.tags ? `<div style="margin-top:14px;">${n.tags.split(',').map(t=>`<span class="badge badge-blue" style="margin-right:4px;">${esc(t.trim())}</span>`).join('')}</div>` : ''}
    <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);">${fmtDate(n.created_at)}</div>
  `, [
    { label: 'Delete', cls: 'btn-danger modal-footer-left', action: `delNote('${id}')` },
    { label: 'Edit', cls: 'btn-ghost', action: `openEditNote('${id}')` },
    { label: 'Close', cls: 'btn-primary', action: 'closeModal()' }
  ]);
}

function openNewNote(prefill) {
  showModal('default', 'New Study Note', noteForm(prefill||{}), [
    { label: 'Cancel', cls: 'btn-ghost', action: 'closeModal()' },
    { label: 'Save Note', cls: 'btn-primary', action: 'saveNote()' }
  ]);
}

function openEditNote(id) {
  const n = cache.studyNotes.find(x => x.id === id); if (!n) return;
  closeModal();
  setTimeout(() => {
    showModal('default', 'Edit Note', noteForm(n), [
      { label: 'Cancel', cls: 'btn-ghost', action: 'closeModal()' },
      { label: 'Save Changes', cls: 'btn-primary', action: `updateNote('${id}')` }
    ]);
  }, 80);
}

function noteForm(n={}) {
  return `
    <div class="form-row">
      <div class="form-group"><label>Book</label><input type="text" id="n-book" value="${esc(n.book||'')}" placeholder="e.g. John" /></div>
      <div class="form-group">
        <label>Chapter</label><input type="text" id="n-chapter" value="${esc(String(n.chapter||''))}" placeholder="3" />
      </div>
    </div>
    <div class="form-group"><label>Verse(s)</label><input type="text" id="n-verse" value="${esc(n.verse||'')}" placeholder="16-17" /></div>
    <div class="form-group"><label>Note</label><textarea id="n-note" rows="6" placeholder="Your observations, reflections, applications...">${esc(n.note||'')}</textarea></div>
    <div class="form-group"><label>Tags (comma separated)</label><input type="text" id="n-tags" value="${esc(n.tags||'')}" placeholder="faith, grace, prophecy" /></div>`;
}

async function saveNote() {
  const note = document.getElementById('n-note').value.trim();
  if (!note) { toast('Please enter a note'); return; }
  const { data, error } = await sb.from('study_notes').insert(notePayload()).select().single();
  if (error) { toast('Error: ' + error.message); return; }
  cache.studyNotes.unshift(data);
  toast('Note saved!'); closeModal(); filterNotes();
}

async function updateNote(id) {
  const note = document.getElementById('n-note').value.trim();
  if (!note) { toast('Note required'); return; }
  const { data, error } = await sb.from('study_notes').update(notePayload()).eq('id', id).select().single();
  if (error) { toast('Error: ' + error.message); return; }
  const i = cache.studyNotes.findIndex(x => x.id === id);
  if (i > -1) cache.studyNotes[i] = data;
  toast('Updated!'); closeModal(); filterNotes();
}

async function delNote(id) {
  if (!confirm('Delete this note?')) return;
  const { error } = await sb.from('study_notes').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  cache.studyNotes = cache.studyNotes.filter(x => x.id !== id);
  toast('Deleted'); closeModal(); filterNotes();
}

function notePayload() {
  return {
    user_id: currentUser.id,
    book:    document.getElementById('n-book').value.trim() || null,
    chapter: document.getElementById('n-chapter').value.trim() || null,
    verse:   document.getElementById('n-verse').value.trim() || null,
    note:    document.getElementById('n-note').value.trim(),
    tags:    document.getElementById('n-tags').value.trim() || null,
  };
}

function rebuildHighlightsMap(rows) {
  studyState.highlights = {};
  rows.filter(r => r.book === studyState.book && r.chapter === studyState.chapter)
      .forEach(r => { studyState.highlights[r.verse] = r.color; });
}

function updateStudyProgress() {
  const count = studyState.readChapters.size;
  const pct   = Math.round((count / TOTAL_CHAPTERS) * 100);
  const fill  = document.getElementById('study-prog-fill');
  const label = document.getElementById('study-prog-label');
  if (fill)  fill.style.width  = pct + '%';
  if (label) label.textContent = `${count} / ${TOTAL_CHAPTERS}`;

  const key = `${studyState.book}_${studyState.chapter}`;
  const btn = document.getElementById('read-chapter-btn');
  if (btn) {
    const isRead = studyState.readChapters.has(key);
    btn.textContent = isRead ? '✓ Read' : 'Mark Read';
    btn.className   = 'read-badge ' + (isRead ? 'read' : 'unread');
  }
}

async function loadStudyChapter() {
  const { book, chapter, translation } = studyState;
  const body = document.getElementById('study-bible-body'); if (!body) return;
  const label = document.getElementById('study-chap-label');
  if (label) label.textContent = `Ch. ${chapter}`;

  const cacheKey = `${book}_${chapter}_${translation}`;
  if (studyState.chapterCache[cacheKey]) {
    renderBibleVerses(studyState.chapterCache[cacheKey]);
    return;
  }

  body.innerHTML = `<div class="loading">Loading ${esc(book)} ${chapter}…</div>`;
  try {
    const ref = `${book} ${chapter}`;
    const url = `https://bible-api.com/${encodeURIComponent(ref)}?translation=${translation}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`API error ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    const verses = data.verses || [];
    studyState.chapterCache[cacheKey] = verses;
    renderBibleVerses(verses);
  } catch (err) {
    body.innerHTML = `<p style="color:var(--text-secondary);font-size:14px;padding:16px;line-height:1.7;">
      Could not load this chapter. Check your internet connection or try a different translation.<br>
      <small style="opacity:0.6;">${esc(err.message)}</small></p>`;
  }
}

function renderBibleVerses(verses) {
  const body = document.getElementById('study-bible-body'); if (!body) return;
  const noteVerses = new Set(
    cache.studyNotes
      .filter(n => n.book === studyState.book && String(n.chapter) === String(studyState.chapter) && n.verse)
      .map(n => String(n.verse).split('-')[0])
  );

  body.innerHTML = verses.map(v => {
    const vn = v.verse;
    const hl = studyState.highlights[vn] ? ` hl-${studyState.highlights[vn]}` : '';
    const hasNote = noteVerses.has(String(vn)) ? ' has-note' : '';
	const sel = studyState.selectedVerses.has(vn) ? ' selected' : '';
    return `<div class="bible-verse${hl}${hasNote}${sel}" id="bv-${vn}" onclick="selectVerse(${vn})">
      <span class="verse-num-label">${vn}</span>
      <span class="verse-text">${esc(v.text.trim())}</span>
    </div>`;
  }).join('');
}

function selectVerse(vn) {
  const sel = studyState.selectedVerses;
  if (sel.has(vn)) {
    sel.delete(vn);
    const el = document.getElementById(`bv-${vn}`);
    if (el) el.classList.remove('selected');
  } else {
    sel.add(vn);
    const el = document.getElementById(`bv-${vn}`);
    if (el) el.classList.add('selected');
  }
  studyState.selectedVerse = sel.size ? [...sel].sort((a,b)=>a-b)[0] : null;

  const bar = document.getElementById('verse-action-bar');
  const ref = document.getElementById('verse-action-ref');
  if (!sel.size) { if (bar) bar.style.display = 'none'; return; }

  const sorted = [...sel].sort((a,b) => a-b);
  const refText = sorted.length === 1
    ? `${studyState.book} ${studyState.chapter}:${sorted[0]}`
    : `${studyState.book} ${studyState.chapter}:${sorted[0]}–${sorted[sorted.length-1]} (${sorted.length} verses)`;
  if (bar) bar.style.display = 'flex';
  if (ref) ref.textContent = refText;
}

function clearVerseSelection() {
  studyState.selectedVerses.forEach(vn => {
    const el = document.getElementById(`bv-${vn}`);
    if (el) el.classList.remove('selected');
  });
  studyState.selectedVerses.clear();
  studyState.selectedVerse = null;
  const bar = document.getElementById('verse-action-bar');
  if (bar) bar.style.display = 'none';
}

async function applyHighlight(color) {
  const sel = studyState.selectedVerses;
  if (!sel.size) return;
  const uid = currentUser.id;
  const { book, chapter } = studyState;

  await Promise.all([...sel].map(async vn => {
    if (color === 'none') {
      await sb.from('verse_highlights').delete()
        .eq('user_id', uid).eq('book', book).eq('chapter', chapter).eq('verse', vn);
      delete studyState.highlights[vn];
    } else {
      await sb.from('verse_highlights').upsert(
        { user_id: uid, book, chapter, verse: vn, color },
        { onConflict: 'user_id,book,chapter,verse' }
      );
      studyState.highlights[vn] = color;
    }
    const el = document.getElementById(`bv-${vn}`);
    if (el) {
      ['hl-yellow','hl-blue','hl-green','hl-pink'].forEach(c => el.classList.remove(c));
      if (color !== 'none') el.classList.add(`hl-${color}`);
    }
  }));

  const count = sel.size;
  toast(color === 'none'
    ? `Highlight removed from ${count} verse${count > 1 ? 's' : ''}`
    : `${count} verse${count > 1 ? 's' : ''} highlighted!`
  );
  clearVerseSelection();
}

function annotateSelectedVerse() {
  const sel = studyState.selectedVerses;
  if (!sel.size) return;
  const { book, chapter } = studyState;
  const sorted = [...sel].sort((a,b) => a-b);
  const verse = sorted.length === 1 ? String(sorted[0]) : `${sorted[0]}-${sorted[sorted.length-1]}`;
  clearVerseSelection();
  openNewNote({ book, chapter: String(chapter), verse });
}

async function addVerseToSermon() {
  const vn = studyState.selectedVerse; if (vn === null) return;
  const { book, chapter } = studyState;
  const verseRef = `${book} ${chapter}:${vn}`;

  // Load sermons if not yet cached
  if (!cache.sermons.length) {
    const { data } = await sb.from('sermons').select('*').eq('user_id', currentUser.id).order('date', { ascending: false });
    cache.sermons = data || [];
  }

  if (!cache.sermons.length) {
    showModal('default', 'Add to Sermon', `
      <p style="font-size:14px;color:var(--text-secondary);">You don't have any sermons yet.</p>
      <p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">Create a sermon first, then come back to link scriptures to it.</p>
    `, [
      { label: 'Go to Sermons', cls: 'btn-primary', action: "closeModal();navigate('sermons')" },
      { label: 'Cancel', cls: 'btn-ghost', action: 'closeModal()' }
    ]);
    return;
  }

  showModal('default', 'Add to Sermon', `
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">
      Adding <strong style="color:var(--primary);">${esc(verseRef)}</strong> to a sermon.
    </p>
    <div class="form-group">
      <label>Choose Sermon</label>
      <select id="ats-sermon-sel" style="width:100%;">
        ${cache.sermons.map(s => `<option value="${s.id}">${esc(s.title)}${s.date ? ' — ' + fmtDate(s.date) : ''}</option>`).join('')}
      </select>
    </div>
  `, [
    { label: 'Cancel', cls: 'btn-ghost', action: 'closeModal()' },
    { label: 'Add Scripture', cls: 'btn-primary', action: `confirmAddVerseToSermon('${esc(verseRef)}')` }
  ]);
}

async function confirmAddVerseToSermon(verseRef) {
  const sel = document.getElementById('ats-sermon-sel'); if (!sel) return;
  const sermonId = sel.value;
  const sermon = cache.sermons.find(s => s.id === sermonId); if (!sermon) return;

  const existing = (sermon.scriptures || '').split('\n').map(s => s.trim()).filter(Boolean);
  if (existing.includes(verseRef)) {
    toast(`${verseRef} is already in that sermon`);
    closeModal(); return;
  }
  const updated = [...existing, verseRef].join('\n');

  const { data, error } = await sb.from('sermons').update({ scriptures: updated }).eq('id', sermonId).select().single();
  if (error) { toast('Error: ' + error.message); return; }

  const i = cache.sermons.findIndex(s => s.id === sermonId);
  if (i > -1) cache.sermons[i] = data;

  toast(`Added ${verseRef} to "${sermon.title}"`);
  closeModal();
  studyState.selectedVerse = null;
  const bar = document.getElementById('verse-action-bar');
  if (bar) bar.style.display = 'none';
}

async function toggleChapterRead() {
  const { book, chapter } = studyState;
  const key = `${book}_${chapter}`;
  const uid = currentUser.id;
  if (studyState.readChapters.has(key)) {
    await sb.from('reading_progress').delete()
      .eq('user_id', uid).eq('book', book).eq('chapter', chapter);
    studyState.readChapters.delete(key);
    toast('Marked unread');
  } else {
    await sb.from('reading_progress').upsert(
      { user_id: uid, book, chapter },
      { onConflict: 'user_id,book,chapter' }
    );
    studyState.readChapters.add(key);
    toast('Chapter marked as read! ✓');
  }
  updateStudyProgress();
}

function onStudyBookChange() {
  const sel = document.getElementById('study-book-sel'); if (!sel) return;
  studyState.book = sel.value;
  studyState.chapter = 1;
  studyState.selectedVerse = null;
  clearVerseSelection();
  loadStudyChapter();
  renderRightPane();
  updateStudyProgress();
}

function onStudyTransChange() {
  const sel = document.getElementById('study-trans-sel'); if (!sel) return;
  studyState.translation = sel.value;
  localStorage.setItem('mh_study_translation', sel.value);
  studyState.selectedVerse = null;
  const bar = document.getElementById('verse-action-bar');
  if (bar) bar.style.display = 'none';
  loadStudyChapter();
}

function studyChapterNav(dir) {
  const book = BIBLE_BOOKS.find(b => b.name === studyState.book);
  if (!book) return;
  const next = studyState.chapter + dir;
  if (next < 1 || next > book.ch) return;
  studyState.chapter = next;
  studyState.selectedVerse = null;
  const bar = document.getElementById('verse-action-bar');
  if (bar) bar.style.display = 'none';
  updateNavBtn();
  loadStudyChapter();
  renderRightPane();
  updateStudyProgress();
}

// ---- Updates the "John 3" button label ----
function updateNavBtn() {
  const btn = document.getElementById('study-nav-btn');
  if (btn) btn.textContent = `${studyState.book} ${studyState.chapter}`;
}

const GROUP_CLASS = {
  law:'pill-law', history:'pill-history', poetry:'pill-poetry',
  prophets:'pill-prophets', minor:'pill-minor',
  'nt-gospel':'pill-nt-gospel', 'nt-hist':'pill-nt-hist',
  'nt-paul':'pill-nt-paul', 'nt-gen':'pill-nt-gen'
};

let bnavTab = 'book';
let bnavSelectedBook = null;

function openBibleNav() {
  bnavTab = 'book';
  bnavSelectedBook = studyState.book;
  document.getElementById('bible-nav-modal').classList.add('active');
  setBibleNavTab('book');
}

function closeBibleNav() {
  document.getElementById('bible-nav-modal').classList.remove('active');
}

function handleBibleNavOverlay(e) {
  if (e.target === document.getElementById('bible-nav-modal')) closeBibleNav();
}

function setBibleNavTab(tab) {
  bnavTab = tab;
  ['book','chapter','verse'].forEach(t => {
    const el = document.getElementById(`bnav-tab-${t}`);
    if (el) el.classList.toggle('active', t === tab);
  });
  renderBibleNavGrid();
}

function renderBibleNavGrid() {
  const grid = document.getElementById('bnav-grid'); if (!grid) return;

  if (bnavTab === 'book') {
    grid.innerHTML = BOOK_META.map(b => {
      const cls = GROUP_CLASS[b.g] || 'pill-num';
      const sel = b.n === (bnavSelectedBook || studyState.book) ? ' pill-selected' : '';
      return `<button class="bible-nav-pill ${cls}${sel}" onclick="bnavSelectBook('${b.n}')">${b.a}</button>`;
    }).join('');

  } else if (bnavTab === 'chapter') {
    const bookName = bnavSelectedBook || studyState.book;
    const bookObj  = BIBLE_BOOKS.find(b => b.name === bookName);
    const total    = bookObj ? bookObj.ch : 1;
    grid.innerHTML = Array.from({length: total}, (_, i) => {
      const ch = i + 1;
      const sel = (bookName === studyState.book && ch === studyState.chapter) ? ' pill-selected' : '';
      return `<button class="bible-nav-pill pill-num${sel}" onclick="bnavSelectChapter(${ch})">${ch}</button>`;
    }).join('');

  } else if (bnavTab === 'verse') {
    // We don't know verse count without loading — show 1-30 as a quick picker
    // and the user can scroll in the reader if needed
    const chCached = studyState.chapterCache[`${studyState.book}_${studyState.chapter}_${studyState.translation}`];
    const total = chCached ? chCached.length : 30;
    grid.innerHTML = Array.from({length: total}, (_, i) => {
      const vn = i + 1;
      const sel = vn === studyState.selectedVerse ? ' pill-selected' : '';
      return `<button class="bible-nav-pill pill-num${sel}" onclick="bnavSelectVerse(${vn})">${vn}</button>`;
    }).join('');
  }
}

function bnavSelectBook(bookName) {
  bnavSelectedBook = bookName;
  renderBibleNavGrid();
  // Auto-advance to chapter tab
  setBibleNavTab('chapter');
}

function bnavSelectChapter(ch) {
  const book = bnavSelectedBook || studyState.book;
  studyState.book    = book;
  studyState.chapter = ch;
  studyState.selectedVerse = null;
  clearVerseSelection();
  updateNavBtn();
  updateStudyProgress();
  loadStudyChapter();
  renderRightPane();
  // Auto-advance to verse tab
  setBibleNavTab('verse');
}

function bnavSelectVerse(vn) {
  closeBibleNav();
  // Scroll to and select the verse
  setTimeout(() => {
    const el = document.getElementById(`bv-${vn}`);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); selectVerse(vn); }
  }, 150);
}

function setStudyTab(tab, btn) {
  studyState.tab = tab;
  document.querySelectorAll('.study-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderRightPane();
}

function renderRightPane() {
  if (studyState.tab === 'chapter') renderChapterNotes();

}

function renderChapterNotes() {
  const el = document.getElementById('study-notes-body'); if (!el) return;
  const title = document.getElementById('study-notes-title');
  if (title) title.textContent = `${studyState.book} ${studyState.chapter}`;

    el.innerHTML = `

async function savePrayer() {
  const request = document.getElementById('pr-request').value.trim();
  if (!request) { toast('Please describe the prayer request'); return; }
  const { data, error } = await sb.from('prayer_requests').insert(prayerPayload()).select().single();
  if (error) { toast('Error: ' + error.message); return; }
  cache.prayers.unshift(data);
  toast('Prayer request saved!'); closeModal(); filterPrayers();
}

async function updatePrayer(id) {
  const request = document.getElementById('pr-request').value.trim();
  if (!request) { toast('Request required'); return; }
  const { data, error } = await sb.from('prayer_requests').update(prayerPayload()).eq('id', id).select().single();
  if (error) { toast('Error: ' + error.message); return; }
  const i = cache.prayers.findIndex(x => x.id === id);
  if (i > -1) cache.prayers[i] = data;
  toast('Updated!'); closeModal(); filterPrayers();
}

async function delPrayer(id) {
  if (!confirm('Delete this prayer request?')) return;
  const { error } = await sb.from('prayer_requests').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  cache.prayers = cache.prayers.filter(x => x.id !== id);
  toast('Deleted'); closeModal(); filterPrayers();
}

function prayerPayload() {
  return {
    user_id: currentUser.id,
    request: document.getElementById('pr-request').value.trim(),
    person:  document.getElementById('pr-person').value.trim() || null,
    status:  document.getElementById('pr-status').value,
    notes:   document.getElementById('pr-notes').value.trim() || null,
  };
}

function openQuickCapture() {
  showModal('default', 'Quick Note', `
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">Where do you want to save this?</p>
    <div class="form-group">
      <label>Type</label>
      <select id="qc-type" onchange="toggleQuickCaptureFields()">
        <option value="study">Bible Study Note</option>
        <option value="prayer">Prayer Request</option>
        <option value="gratitude">Gratitude Entry</option>
        <option value="sermon">Sermon Note</option>
      </select>
    </div>
    <div id="qc-fields">
      <div class="form-group"><label>Book / Reference (optional)</label><input type="text" id="qc-ref" placeholder="e.g. Psalm 23" /></div>
      <div class="form-group"><label>Note</label><textarea id="qc-text" rows="4" placeholder="Capture your thought..."></textarea></div>
    </div>
  `, [
    { label: 'Cancel', cls: 'btn-ghost', action: 'closeModal()' },
    { label: 'Save', cls: 'btn-primary', action: 'saveQuickCapture()' }
  ]);
}

function toggleQuickCaptureFields() {
  const type = document.getElementById('qc-type').value;
  const refEl = document.getElementById('qc-ref');
  const show = { study: 'Book / Reference (optional)', sermon: 'Title / Reference (optional)' };
  if (refEl) refEl.parentElement.style.display = (type === 'prayer' || type === 'gratitude') ? 'none' : '';
  if (refEl && show[type]) refEl.previousElementSibling.textContent = show[type];
}

async function saveQuickCapture() {
  const type = document.getElementById('qc-type').value;
  const text = document.getElementById('qc-text')?.value.trim();
  const ref  = document.getElementById('qc-ref')?.value.trim();
  if (!text) { toast('Please enter some text'); return; }
  let error;
  if (type === 'study') {
    const parts = ref ? ref.split(' ') : [];
    const chapterVerse = parts.pop() || '';
    const book = parts.join(' ') || null;
    const [ch, vs] = chapterVerse.includes(':') ? chapterVerse.split(':') : [chapterVerse, null];
    ({ error } = await sb.from('study_notes').insert({ user_id: currentUser.id, note: text, book, chapter: ch||null, verse: vs||null }));
  } else if (type === 'prayer') {
    ({ error } = await sb.from('prayer_requests').insert({ user_id: currentUser.id, request: text, status: 'active' }));
  } else if (type === 'gratitude') {
    ({ error } = await sb.from('gratitude_log').insert({ user_id: currentUser.id, entry: text }));
  } else if (type === 'sermon') {
    ({ error } = await sb.from('sermons').insert({ user_id: currentUser.id, title: ref || 'Quick Note', notes: text, status: 'draft' }));
  }
  if (error) { toast('Error: ' + error.message); return; }
  toast('Saved!'); closeModal();
}

function setFilter(section, value, btn) {
  if (section === 'sermon') {
    sermonFilter = value;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    filterSermons();
  } else if (section === 'prayer') {
    prayerFilter = value;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    filterPrayers();
  }
}

// ============================================================
//  MODAL SYSTEM
// ============================================================
function showModal(size, title, bodyHTML, buttons) {
  const container = document.getElementById('modal-container');
  const cls = size === 'large' ? 'modal modal-lg' : 'modal';
  const footerLeft  = buttons.filter(b => b.cls.includes('modal-footer-left'));
  const footerRight = buttons.filter(b => !b.cls.includes('modal-footer-left'));
  const mkBtn = b => `<button class="btn ${b.cls.replace('modal-footer-left','').trim()}" onclick="${b.action}">${b.label}</button>`;
  container.innerHTML = `
    <div class="${cls}">
      <div class="modal-header">
        <span class="modal-header-title">${title}</span>
        <button class="close-btn" onclick="closeModal()">&#215;</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
      <div class="modal-footer">
        ${footerLeft.map(mkBtn).join('')}
        ${footerRight.map(mkBtn).join('')}
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ============================================================
//  HELPERS
// ============================================================
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function trunc(s, len) { return s && s.length > len ? s.substring(0, len) + '…' : (s || ''); }
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function ago(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d)) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  const days = Math.floor(diff/86400);
  return days < 30 ? days + 'd ago' : fmtDate(d);
}
function greeting() {
  const h = new Date().getHours();
  return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}
function statusBadge(s) {
  const m = { draft: 'badge-amber', preached: 'badge-green', archived: 'badge-gray' };
  return `<span class="badge ${m[s]||'badge-gray'}">${s||'draft'}</span>`;
}
function prayerBadge(s) {
  const m = { active: 'badge-blue', answered: 'badge-green', archived: 'badge-gray' };
  return `<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;
}
function emptyState(icon, msg, action='') {
  return `<div class="empty-state"><div class="empty-state-icon">${icon}</div><p>${msg}</p>${action}</div>`;
}
function errMsg(e) { return `<p style="color:#A32D2D;font-size:14px;padding:16px;">Error: ${esc(e.message)}</p>`; }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ============================================================
//  KEY QUOTES  (stored in localStorage per sermon)
// ============================================================
function quotesKey(id) { return `mh_quotes_${id}`; }
function getSermonQuotes(id) {
  try { return JSON.parse(localStorage.getItem(quotesKey(id)) || '[]'); } catch { return []; }
}
function saveSermonQuotes(id, arr) { localStorage.setItem(quotesKey(id), JSON.stringify(arr)); }
function addQuote(id) {
  const inp = document.getElementById('new-quote-input');
  const val = inp?.value.trim(); if (!val) return;
  const arr = getSermonQuotes(id);
  arr.push(val); saveSermonQuotes(id, arr);
  inp.value = '';
  toast('Quote saved!');
  closeModal();
  openSermonDetail(id);
}
function removeQuote(id, idx) {
  const arr = getSermonQuotes(id);
  arr.splice(idx, 1); saveSermonQuotes(id, arr);
  closeModal(); openSermonDetail(id);
}

// ============================================================
//  SERMON CHECKLIST  (stored in localStorage per sermon)
// ============================================================
function checkKey(id) { return `mh_check_${id}`; }
function getSermonChecklist(id) {
  try { return JSON.parse(localStorage.getItem(checkKey(id)) || '[]'); } catch { return []; }
}
function toggleCheck(id, item, el) {
  const arr = getSermonChecklist(id);
  const idx = arr.indexOf(item);
  if (idx > -1) arr.splice(idx, 1); else arr.push(item);
  localStorage.setItem(checkKey(id), JSON.stringify(arr));
  const done = arr.includes(item);
  el.classList.toggle('done', done);
  el.querySelector('.check-box').textContent = done ? '✓' : '';
  el.querySelector('.check-label').style.textDecoration = done ? 'line-through' : '';
}

// ============================================================
//  PRINT VIEW
// ============================================================
function printSermon(id) {
  const s = cache.sermons.find(x => x.id === id); if (!s) return;
  const vss    = (s.scriptures || '').split('\n').filter(Boolean);
  const quotes = getSermonQuotes(id);

  // Parse WWH + notes
  let wwhPrint = '', notesPrint = '';
  try {
    const n = s.notes ? JSON.parse(s.notes) : null;
    if (n?._wwh) {
      if (n.what || n.why || n.how) {
        wwhPrint = `
          <div class="print-section-label" style="margin-top:36px;">What, Why &amp; How</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px;">
            ${n.what?`<div style="border:1px solid #eee;border-radius:6px;padding:10px 12px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#185FA5;margin-bottom:5px;">What</div><div style="font-size:13px;line-height:1.65;">${esc(n.what)}</div></div>`:''}
            ${n.why ?`<div style="border:1px solid #eee;border-radius:6px;padding:10px 12px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#8B3A8B;margin-bottom:5px;">Why</div><div style="font-size:13px;line-height:1.65;">${esc(n.why)}</div></div>`:''}
            ${n.how ?`<div style="border:1px solid #eee;border-radius:6px;padding:10px 12px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#2E7D32;margin-bottom:5px;">How</div><div style="font-size:13px;line-height:1.65;">${esc(n.how)}</div></div>`:''}
          </div>`;
      }
      if (n.notes) notesPrint = `<div class="print-section-label">Notes</div><div class="print-content">${esc(n.notes)}</div>`;
    } else if (s.notes) {
      notesPrint = `<div class="print-section-label">Notes</div><div class="print-content">${esc(s.notes)}</div>`;
    }
  } catch { if (s.notes) notesPrint = `<div class="print-section-label">Notes</div><div class="print-content">${esc(s.notes)}</div>`; }

  // Parse structured outline
  let introPrint = '', pointsPrint = '', conclusionPrint = '';
  try {
    const o = s.outline ? JSON.parse(s.outline) : null;
    if (o?._structured) {
      if (o.intro) introPrint = `<div class="print-section-label">Introduction</div><div class="print-content" style="margin-bottom:20px;">${esc(o.intro)}</div>`;
      if (o.points?.some(p => p.title || p.topics?.some(t=>t.text))) {
        o.points.forEach((p, pi) => {
          if (!p.title && !p.topics?.some(t=>t.text)) return;
          // page-break-inside:avoid keeps the whole point together;
          // page-break-after:auto means the browser breaks AFTER it if needed
          let html = `<div class="print-point-block">`;
          html += `<div style="font-size:17px;font-weight:700;margin-bottom:12px;"><span style="color:#185FA5;margin-right:8px;">${String.fromCharCode(65+pi)}.</span>${esc(p.title||'')}</div>`;
          (p.topics||[]).forEach((t, ti) => {
            if (!t.text) return;
            html += `<div style="margin-left:18px;margin-bottom:8px;"><div style="font-size:15px;font-weight:500;">${ti+1}. ${esc(t.text)}${t.ref?` <span style="color:#185FA5;font-size:12px;font-weight:400;">(${esc(t.ref)})</span>`:''}</div>`;
            (t.subtopics||[]).forEach(st => {
              if (!st.text) return;
              html += `<div style="margin-left:24px;font-size:13px;color:#444;margin-top:3px;">— ${esc(st.text)}${st.ref?` <span style="color:#185FA5;font-size:11px;">(${esc(st.ref)})</span>`:''}</div>`;
            });
            html += `</div>`;
          });
          html += `</div>`;
          pointsPrint += html;
        });
      }
      if (o.conclusion) conclusionPrint = `<div class="print-point-block"><div class="print-section-label" style="margin-top:0;">Conclusion</div><div class="print-content">${esc(o.conclusion)}</div></div>`;
      if (o.legacyOutline) pointsPrint += `<div class="print-content">${esc(o.legacyOutline)}</div>`;
    } else if (s.outline) {
      pointsPrint = `<div class="print-content">${esc(s.outline)}</div>`;
    }
  } catch { if (s.outline) pointsPrint = `<div class="print-content">${esc(s.outline)}</div>`; }

  const pv = document.getElementById('print-view');
  pv.innerHTML = `
    <!-- PAGE 1: Title + What/Why/How + Scriptures, then force a page break -->
    <div class="print-page-1">
      <div class="print-sermon-title">${esc(s.title)}</div>
      ${wwhPrint}
      ${vss.length ? `<div class="print-section-label" style="margin-top:28px;">Scriptures</div>${vss.map(v=>`<div class="print-scripture-block">${esc(v)}</div>`).join('')}` : ''}
    </div>

    <!-- PAGE 2+: Outline, notes, quotes — flows naturally,
         page breaks happen only after a complete point, never mid-point -->
    <div class="print-content-pages">
      ${introPrint}
      ${pointsPrint ? `<div class="print-section-label">Main Points</div>${pointsPrint}` : ''}
      ${conclusionPrint}
      ${notesPrint}
      ${quotes.length ? `<div class="print-section-label">Key Quotes</div>${quotes.map(q=>`<div class="print-quote">${esc(q)}</div>`).join('')}` : ''}
    </div>
  `;
  closeModal();
  window.print();
}

// ============================================================
//  PREACHING MODE
// ============================================================
let preachInterval = null;
let preachSeconds  = 0;
let preachRunning  = false;
let preachSections = [];
let preachFocusIdx = -1;
let preachSermonId = null;

function openPreachingMode(id) {
  const s = cache.sermons.find(x => x.id === id); if (!s) return;
  const vss = (s.scriptures || '').split('\n').filter(Boolean);
  const quotes = getSermonQuotes(id);
  closeModal();

  preachSermonId = id;
  preachSections = [];
  preachFocusIdx = -1;

  document.getElementById('preach-title-label').textContent = s.title;
  preachSeconds = 0; preachRunning = false;
  document.getElementById('preach-timer').textContent = '0:00';
  document.getElementById('preach-timer-btn').textContent = '▶ Start';
  loadPreachTranslation();

  // Parse data
  let outline = null, notesData = null;
  try { outline = s.outline ? JSON.parse(s.outline) : null; } catch {}
  try { notesData = s.notes ? JSON.parse(s.notes) : null; } catch {}

  // Build sections list for focus popup & nav
  if (outline?._structured) {
    if (outline.intro) preachSections.push({ type:'intro', label:'Introduction', data: outline.intro });
    (outline.points||[]).forEach((p, pi) => {
      if (p.title || p.topics?.some(t=>t.text))
        preachSections.push({ type:'point', label:`${String.fromCharCode(65+pi)}. ${p.title||'(untitled)'}`, data: p, index: pi, quotes });
    });
    if (outline.conclusion) preachSections.push({ type:'conclusion', label:'Conclusion', data: outline.conclusion });
  }

  // LEFT PANE
  let leftHTML = '';
  if (vss.length) {
    leftHTML += `<div class="preach-section-label" style="margin-bottom:8px;">Scriptures</div>`;
    vss.forEach(v => leftHTML += `<div class="preach-scripture" onclick="showScripturePopup(this)" data-ref="${esc(v)}">${esc(v)}</div>`);
  }
  if (preachSections.length) {
    leftHTML += `<div class="preach-section-label" style="margin-top:20px;margin-bottom:8px;">Sections — tap to focus</div>`;
    preachSections.forEach((sec, idx) => {
      const icon = sec.type==='point' ? String.fromCharCode(65+sec.index)+'.' : '▸';
      leftHTML += `<button class="preach-nav-btn" id="preach-nav-${idx}" onclick="openFocusPopup(${idx})"><span class="preach-nav-icon">${icon}</span><span>${esc(sec.label)}</span></button>`;
    });
  }
  if (!vss.length && !preachSections.length) leftHTML = `<p style="color:rgba(240,239,232,0.22);font-size:13px;line-height:1.6;">No scriptures or sections yet.</p>`;
  document.getElementById('preach-left').innerHTML = leftHTML;

  // RIGHT PANE — full outline
  let rightHTML = '';
  if (notesData?._wwh && (notesData.what||notesData.why||notesData.how)) {
    rightHTML += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:32px;">`;
    if (notesData.what) rightHTML += `<div style="background:rgba(24,95,165,0.12);border-radius:8px;padding:12px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(168,207,238,0.5);margin-bottom:6px;">What</div><div style="font-size:14px;color:rgba(240,239,232,0.8);line-height:1.6;">${esc(notesData.what)}</div></div>`;
    if (notesData.why)  rightHTML += `<div style="background:rgba(139,58,139,0.12);border-radius:8px;padding:12px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(210,168,210,0.5);margin-bottom:6px;">Why</div><div style="font-size:14px;color:rgba(240,239,232,0.8);line-height:1.6;">${esc(notesData.why)}</div></div>`;
    if (notesData.how)  rightHTML += `<div style="background:rgba(46,125,50,0.12);border-radius:8px;padding:12px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(168,210,168,0.5);margin-bottom:6px;">How</div><div style="font-size:14px;color:rgba(240,239,232,0.8);line-height:1.6;">${esc(notesData.how)}</div></div>`;
    rightHTML += `</div>`;
  }
  if (quotes.length) {
    rightHTML += `<div class="preach-section-label" style="margin-bottom:12px;">Key Quotes</div>`;
    quotes.forEach(q => rightHTML += `<div class="preach-highlight">${esc(q)}</div>`);
    rightHTML += `<div style="margin-bottom:32px;"></div>`;
  }
  if (outline?._structured) {
    if (outline.intro) rightHTML += `<div class="preach-section-label" style="margin-bottom:10px;">Introduction</div><div class="preach-outline" style="margin-bottom:28px;">${esc(outline.intro)}</div>`;
    if (outline.points?.some(p=>p.title||p.topics?.some(t=>t.text))) {
      rightHTML += `<div class="preach-section-label" style="margin-bottom:14px;">Main Points</div>`;
      outline.points.forEach((p,pi) => {
        if (!p.title && !p.topics?.some(t=>t.text)) return;
        rightHTML += `<div style="margin-bottom:28px;"><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:12px;"><span style="font-size:32px;font-weight:700;color:rgba(74,158,232,0.55);min-width:36px;line-height:1.2;">${String.fromCharCode(65+pi)}.</span><span style="font-size:26px;font-weight:600;color:#f0efe8;line-height:1.3;">${esc(p.title||'')}</span></div>`;
        (p.topics||[]).forEach((t,ti) => {
          if (!t.text) return;
          rightHTML += `<div style="margin-left:48px;margin-bottom:10px;"><div style="display:flex;align-items:baseline;gap:10px;"><span style="font-size:18px;font-weight:600;color:rgba(168,207,238,0.5);min-width:22px;">${ti+1}.</span><div><span style="font-size:20px;color:#f0efe8;line-height:1.6;">${esc(t.text)}</span>${t.ref?`<span class="focus-ref-chip" onclick="previewRefText('${esc(t.ref)}')">${esc(t.ref)}</span>`:''}</div></div>`;
          (t.subtopics||[]).forEach(st => {
            if (!st.text) return;
            rightHTML += `<div style="margin-left:32px;margin-top:6px;display:flex;align-items:baseline;gap:8px;"><span style="color:rgba(240,239,232,0.3);font-size:16px;min-width:18px;">—</span><div><span style="font-size:17px;color:rgba(240,239,232,0.65);line-height:1.6;">${esc(st.text)}</span>${st.ref?`<span class="focus-ref-chip" style="font-size:11px;" onclick="previewRefText('${esc(st.ref)}')">${esc(st.ref)}</span>`:''}</div></div>`;
          });
          rightHTML += `</div>`;
        });
        rightHTML += `</div>`;
      });
    }
    if (outline.conclusion) rightHTML += `<div class="preach-section-label" style="margin-bottom:10px;">Conclusion</div><div class="preach-outline">${esc(outline.conclusion)}</div>`;
  } else if (s.outline) {
    rightHTML += `<div class="preach-section-label" style="margin-bottom:12px;">Outline</div><div class="preach-outline">${esc(s.outline)}</div>`;
  }
  const notesText = notesData?._wwh ? notesData.notes : (typeof s.notes==='string'&&!s.notes.startsWith('{') ? s.notes : '');
  if (notesText) rightHTML += `<div class="preach-section-label" style="margin-top:32px;margin-bottom:12px;">Notes</div><div class="preach-notes">${esc(notesText)}</div>`;
  if (!rightHTML) rightHTML = `<p style="color:rgba(240,239,232,0.3);font-size:18px;">No outline or notes yet. Add content first.</p>`;
  document.getElementById('preach-right').innerHTML = rightHTML;
  document.getElementById('preaching-mode').classList.add('active');
}

// ============================================================
//  FOCUS POPUP — section drill-down with prev/next
// ============================================================
let focusCurrentIdx = -1;

function openFocusPopup(idx) {
  focusCurrentIdx = idx;
  renderFocusPopup();
  document.getElementById('preach-focus-popup').classList.add('active');
  // Highlight active nav button
  document.querySelectorAll('.preach-nav-btn').forEach((b,i) => b.classList.toggle('focused', i===idx));
}

function closeFocusPopup(e) {
  if (e && e.target !== document.getElementById('preach-focus-popup')) return;
  document.getElementById('preach-focus-popup').classList.remove('active');
  document.querySelectorAll('.preach-nav-btn').forEach(b => b.classList.remove('focused'));
  focusCurrentIdx = -1;
}

function focusStep(dir) {
  const next = focusCurrentIdx + dir;
  if (next < 0 || next >= preachSections.length) return;
  focusCurrentIdx = next;
  renderFocusPopup();
  document.querySelectorAll('.preach-nav-btn').forEach((b,i) => b.classList.toggle('focused', i===focusCurrentIdx));
}

function renderFocusPopup() {
  const sec = preachSections[focusCurrentIdx];
  if (!sec) return;
  const total = preachSections.length;
  document.getElementById('focus-counter').textContent = `${focusCurrentIdx+1} / ${total}`;
  document.getElementById('focus-prev-btn').disabled = focusCurrentIdx === 0;
  document.getElementById('focus-next-btn').disabled = focusCurrentIdx === total-1;

  let html = '';
  if (sec.type === 'intro') {
    html += `<div class="focus-section-type">Introduction</div>`;
    html += `<div class="focus-intro-text">${esc(sec.data)}</div>`;
  } else if (sec.type === 'conclusion') {
    html += `<div class="focus-section-type">Conclusion</div>`;
    html += `<div class="focus-intro-text">${esc(sec.data)}</div>`;
  } else if (sec.type === 'point') {
    const p = sec.data;
    html += `<div class="focus-section-type">Main Point ${String.fromCharCode(65+sec.index)}</div>`;
    html += `<div class="focus-point-title">${esc(p.title||'(untitled)')}</div>`;
    (p.topics||[]).forEach((t, ti) => {
      if (!t.text) return;
      html += `<div class="focus-topic-row">
        <span class="focus-topic-num">${ti+1}.</span>
        <div>
          <span class="focus-topic-text">${esc(t.text)}</span>
          ${t.ref ? `<span class="focus-ref-chip" onclick="previewRefText('${esc(t.ref)}')">${esc(t.ref)}</span>` : ''}
          ${(t.subtopics||[]).filter(st=>st.text).map(st=>`
            <div class="focus-subtopic-row">
              <span class="focus-subtopic-dash">—</span>
              <div>
                <span class="focus-subtopic-text">${esc(st.text)}</span>
                ${st.ref ? `<span class="focus-ref-chip" style="font-size:12px;" onclick="previewRefText('${esc(st.ref)}')">${esc(st.ref)}</span>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });
    // Key quotes for this sermon
    if (sec.quotes?.length) {
      html += `<hr class="focus-quotes-divider">`;
      sec.quotes.forEach(q => html += `<div class="focus-quote-block">${esc(q)}</div>`);
    }
  }
  document.getElementById('focus-popup-body').innerHTML = html;
  document.getElementById('focus-popup-body').scrollTop = 0;
}

function savePreachTranslation() {
  const val = document.getElementById('preach-translation').value;
  localStorage.setItem('mh_preach_translation', val);
}

function loadPreachTranslation() {
  const saved = localStorage.getItem('mh_preach_translation') || 'kjv';
  const sel = document.getElementById('preach-translation');
  if (sel) sel.value = saved;
}

async function showScripturePopup(el) {
  const ref = (el.dataset?.ref || el).trim();
  const textEl = document.getElementById('preach-popup-text');
  const refEl  = document.getElementById('preach-popup-ref');

  textEl.innerHTML = `<span class="loading-verse">Loading ${esc(ref)}…</span>`;
  refEl.textContent = ref;
  document.getElementById('preach-scripture-popup').classList.add('active');

  const translation = document.getElementById('preach-translation')?.value || 'kjv';
  const passage = ref.replace(/\b(KJV|NIV|ESV|NKJV|NLT|NASB|MSG|AMP|CSB|RSV|WEB|WEBBE|OEB)\b/i, '').trim();
  const cacheKey = `mh_verse_${passage.toLowerCase().replace(/\s+/g,'_')}_${translation}`;

  // Try offline cache first
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    const c = JSON.parse(cached);
    refEl.textContent = c.label;
    textEl.innerHTML  = c.html;
    return;
  }

  try {
    const url = `https://bible-api.com/${encodeURIComponent(passage)}?translation=${translation}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`API error ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    let html = '';
    if (data.verses?.length > 1) {
      data.verses.forEach(v => { html += `<sup class="verse-num">${v.verse}</sup>${esc(v.text.trim())} `; });
    } else {
      html = esc((data.text||'').trim());
    }
    const sel = document.getElementById('preach-translation');
    const transLabel = sel?.options[sel.selectedIndex]?.text.split('—')[0].trim() || translation.toUpperCase();
    const label = `${passage} — ${transLabel}`;
    refEl.textContent = label;
    textEl.innerHTML  = html;
    // Cache for offline use
    try { localStorage.setItem(cacheKey, JSON.stringify({ html, label })); } catch {}
  } catch {
    textEl.innerHTML = `<span class="error-verse">Could not load verse. Check your connection, or verify the reference (e.g. "Luke 1:28-33"). Previously loaded verses work offline.</span>`;
  }
}

// ---- Preview scripture reference by text value (used in detail view & preaching mode) ----
function previewRefText(ref) {
  const fakeEl = { dataset: { ref: ref } };
  showScripturePopup(fakeEl);
}

function closeScripturePopup(e) {
  if (e && e.target !== document.getElementById('preach-scripture-popup')) return;
  document.getElementById('preach-scripture-popup').classList.remove('active');
}

function closePreachingMode() {
  clearInterval(preachInterval);
  preachInterval = null; preachRunning = false;
  document.getElementById('preaching-mode').classList.remove('active');
}

function togglePreachTimer() {
  preachRunning = !preachRunning;
  document.getElementById('preach-timer-btn').textContent = preachRunning ? '⏸ Pause' : '▶ Resume';
  if (preachRunning) {
    preachInterval = setInterval(() => {
      preachSeconds++;
      const m = Math.floor(preachSeconds / 60);
      const s = preachSeconds % 60;
      document.getElementById('preach-timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);
  } else {
    clearInterval(preachInterval);
  }
}

function resetPreachTimer() {
  clearInterval(preachInterval);
  preachSeconds = 0; preachRunning = false;
  document.getElementById('preach-timer').textContent = '0:00';
  document.getElementById('preach-timer-btn').textContent = '▶ Start';
}

// ============================================================
//  EXPORT TO WORD (.docx via docx CDN)
// ============================================================
async function loadDocx() {
  if (window.docx) return true;
  try {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/docx@8/build/index.umd.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    return true;
  } catch { toast('Could not load Word export library'); return false; }
}

async function exportSermonsDocx() {
  const items = cache.sermons;
  if (!items.length) { toast('No sermons to export'); return; }
  toast('Building Word document…');
  if (!await loadDocx()) return;
  const blob = await buildDocxBlob(items, 'Sermon Archive');
  downloadBlob(blob, 'sermons.docx');
  toast('Downloaded sermons.docx!');
}

async function exportSingleSermonDocx(id) {
  const s = cache.sermons.find(x => x.id === id); if (!s) return;
  toast('Building Word document…');
  if (!await loadDocx()) return;
  const blob = await buildDocxBlob([s], s.title);
  downloadBlob(blob, `${s.title.replace(/[^a-z0-9]/gi,'_')}.docx`);
  toast('Downloaded!');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

async function buildDocxBlob(sermons, archiveTitle) {
  const { Document, Packer, Paragraph, TextRun, PageBreak, BorderStyle, AlignmentType } = window.docx;

  // Helper to make a section label paragraph
  const sectionLabel = text => new Paragraph({
    children: [new TextRun({ text, size: 18, bold: true, color: '888888', allCaps: true })],
    spacing: { before: 320, after: 100 },
    border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: 'DDDDDD', space: 4 } }
  });

  const allChildren = [];

  sermons.forEach((s, idx) => {
    if (idx > 0) allChildren.push(new Paragraph({ children: [new PageBreak()] }));

    // Parse notes/WWH
    let wwh = null, notesText = '';
    try {
      const n = s.notes ? JSON.parse(s.notes) : null;
      if (n?._wwh) { wwh = n; notesText = n.notes || ''; }
      else notesText = s.notes || '';
    } catch { notesText = s.notes || ''; }

    // Parse outline
    let outline = null;
    try { outline = s.outline ? JSON.parse(s.outline) : null; } catch {}

    // ── PAGE 1: Title + WWH + Scriptures ──
    // Title
    allChildren.push(new Paragraph({
      children: [new TextRun({ text: s.title, size: 52, bold: true, font: 'Georgia', color: '1A1A2E' })],
      spacing: { after: 360 },
      border: { bottom: { style: BorderStyle.SINGLE, size: 8, color: '1A1A2E', space: 6 } }
    }));

    // What / Why / How
    if (wwh && (wwh.what || wwh.why || wwh.how)) {
      allChildren.push(sectionLabel('What, Why & How'));
      if (wwh.what) {
        allChildren.push(new Paragraph({ children: [new TextRun({ text: 'WHAT  ', size: 18, bold: true, color: '185FA5' }), new TextRun({ text: wwh.what, size: 22 })], spacing: { after: 80 } }));
      }
      if (wwh.why) {
        allChildren.push(new Paragraph({ children: [new TextRun({ text: 'WHY  ', size: 18, bold: true, color: '8B3A8B' }), new TextRun({ text: wwh.why, size: 22 })], spacing: { after: 80 } }));
      }
      if (wwh.how) {
        allChildren.push(new Paragraph({ children: [new TextRun({ text: 'HOW  ', size: 18, bold: true, color: '2E7D32' }), new TextRun({ text: wwh.how, size: 22 })], spacing: { after: 80 } }));
      }
    }

    // Scriptures
    const vss = (s.scriptures || '').split('\n').filter(Boolean);
    if (vss.length) {
      allChildren.push(sectionLabel('Scriptures'));
      vss.forEach(v => allChildren.push(new Paragraph({
        children: [new TextRun({ text: v, italics: true, color: '185FA5', size: 22 })],
        spacing: { after: 80 }, indent: { left: 360 }
      })));
    }

    // Page break before outline
    allChildren.push(new Paragraph({ children: [new PageBreak()] }));

    // ── PAGE 2+: Outline ──
    if (outline?._structured) {
      // Introduction
      if (outline.intro) {
        allChildren.push(sectionLabel('Introduction'));
        allChildren.push(new Paragraph({ children: [new TextRun({ text: outline.intro, size: 22 })], spacing: { after: 120 } }));
      }

      // Main Points
      const validPoints = (outline.points || []).filter(p => p.title || p.topics?.some(t => t.text));
      if (validPoints.length) {
        allChildren.push(sectionLabel('Main Points'));
        validPoints.forEach((p, pi) => {
          // Point title
          allChildren.push(new Paragraph({
            children: [
              new TextRun({ text: `${String.fromCharCode(65+pi)}.  `, size: 28, bold: true, color: '185FA5' }),
              new TextRun({ text: p.title || '', size: 28, bold: true, color: '1A1A2E' })
            ],
            spacing: { before: 240, after: 120 },
            keepNext: true
          }));
          // Topics
          (p.topics || []).forEach((t, ti) => {
            if (!t.text) return;
            const tRuns = [new TextRun({ text: `${ti+1}.  `, size: 22, bold: true, color: '66667A' }), new TextRun({ text: t.text, size: 22 })];
            if (t.ref) tRuns.push(new TextRun({ text: `  (${t.ref})`, size: 20, italics: true, color: '185FA5' }));
            allChildren.push(new Paragraph({ children: tRuns, spacing: { after: 80 }, indent: { left: 360 }, keepNext: true }));
            // Subtopics
            (t.subtopics || []).forEach(st => {
              if (!st.text) return;
              const stRuns = [new TextRun({ text: '—  ', size: 20, color: 'AAAAAA' }), new TextRun({ text: st.text, size: 20, color: '444444' })];
              if (st.ref) stRuns.push(new TextRun({ text: `  (${st.ref})`, size: 18, italics: true, color: '185FA5' }));
              allChildren.push(new Paragraph({ children: stRuns, spacing: { after: 60 }, indent: { left: 720 } }));
            });
          });
        });
      }

      // Conclusion
      if (outline.conclusion) {
        allChildren.push(sectionLabel('Conclusion'));
        allChildren.push(new Paragraph({ children: [new TextRun({ text: outline.conclusion, size: 22 })], spacing: { after: 120 } }));
      }
    } else if (s.outline) {
      allChildren.push(sectionLabel('Outline'));
      s.outline.split('\n').forEach(line => allChildren.push(new Paragraph({ children: [new TextRun({ text: line || ' ', size: 22 })], spacing: { after: 60 } })));
    }

    // Notes
    if (notesText) {
      allChildren.push(sectionLabel('Notes'));
      allChildren.push(new Paragraph({ children: [new TextRun({ text: notesText, size: 22 })], spacing: { after: 120 } }));
    }

    // Key Quotes
    const quotes = getSermonQuotes(s.id);
    if (quotes.length) {
      allChildren.push(sectionLabel('Key Quotes'));
      quotes.forEach(q => allChildren.push(new Paragraph({
        children: [new TextRun({ text: `"${q}"`, italics: true, bold: true, color: '8B5E00', size: 24 })],
        spacing: { after: 120 }, indent: { left: 360 }
      })));
    }
  });

  const doc = new Document({
    styles: { default: { document: { run: { font: 'Arial', size: 22 } } } },
    sections: [{
      properties: { page: { size: { width: 12240, height: 15840 }, margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 } } },
      children: allChildren
    }]
  });

  return Packer.toBlob(doc);
}

// ---- START ----
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('preach-scripture-popup').classList.contains('active')) {
      document.getElementById('preach-scripture-popup').classList.remove('active');
    } else if (document.getElementById('preach-focus-popup').classList.contains('active')) {
      closeFocusPopup();
    } else if (document.getElementById('preaching-mode').classList.contains('active')) {
      closePreachingMode();
    }
  }
  // Left/Right arrow keys to step through sections while focus popup is open
  if (document.getElementById('preach-focus-popup').classList.contains('active')) {
    if (e.key === 'ArrowRight') focusStep(1);
    if (e.key === 'ArrowLeft')  focusStep(-1);
  }
});
init();
