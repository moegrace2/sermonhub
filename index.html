// ============================================================
//  MODAL SYSTEM
// ============================================================
function showModal(size, title, bodyHTML, buttons) {
  const container = document.getElementById('modal-container');
  const cls = size === 'large' ? 'modal modal-lg' : 'modal';
  const footerLeft  = buttons.filter(b => b.cls.includes('modal-footer-left'));
  const footerRight = buttons.filter(b => !b.cls.includes('modal-footer-left'));
  const mkBtn = b => `<button class="btn ${b.cls.replace('modal-footer-left','').trim()}" onclick="${b.action}">${b.label}</button>`;
  container.innerHTML = `
    <div class="${cls}">
      <div class="modal-header">
        <span class="modal-header-title">${title}</span>
        <button class="close-btn" onclick="closeModal()">&#215;</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
      <div class="modal-footer">
        ${footerLeft.map(mkBtn).join('')}
        ${footerRight.map(mkBtn).join('')}
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ============================================================
//  HELPERS
// ============================================================
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function trunc(s, len) { return s && s.length > len ? s.substring(0, len) + '…' : (s || ''); }
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function ago(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d)) / 1000);
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  const days = Math.floor(diff/86400);
  return days < 30 ? days + 'd ago' : fmtDate(d);
}
function greeting() {
  const h = new Date().getHours();
  return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}
function statusBadge(s) {
  const m = { draft: 'badge-amber', preached: 'badge-green', archived: 'badge-gray' };
  return `<span class="badge ${m[s]||'badge-gray'}">${s||'draft'}</span>`;
}
function prayerBadge(s) {
  const m = { active: 'badge-blue', answered: 'badge-green', archived: 'badge-gray' };
  return `<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;
}
function emptyState(icon, msg, action='') {
  return `<div class="empty-state"><div class="empty-state-icon">${icon}</div><p>${msg}</p>${action}</div>`;
}
function errMsg(e) { return `<p style="color:#A32D2D;font-size:14px;padding:16px;">Error: ${esc(e.message)}</p>`; }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ============================================================
//  KEY QUOTES  (stored in localStorage per sermon)
// ============================================================
function quotesKey(id) { return `mh_quotes_${id}`; }
function getSermonQuotes(id) {
  try { return JSON.parse(localStorage.getItem(quotesKey(id)) || '[]'); } catch { return []; }
}
function saveSermonQuotes(id, arr) { localStorage.setItem(quotesKey(id), JSON.stringify(arr)); }
function addQuote(id) {
  const inp = document.getElementById('new-quote-input');
  const val = inp?.value.trim(); if (!val) return;
  const arr = getSermonQuotes(id);
  arr.push(val); saveSermonQuotes(id, arr);
  inp.value = '';
  toast('Quote saved!');
  closeModal();
  openSermonDetail(id);
}
function removeQuote(id, idx) {
  const arr = getSermonQuotes(id);
  arr.splice(idx, 1); saveSermonQuotes(id, arr);
  closeModal(); openSermonDetail(id);
}

// ============================================================
//  SERMON CHECKLIST  (stored in localStorage per sermon)
// ============================================================
function checkKey(id) { return `mh_check_${id}`; }
function getSermonChecklist(id) {
  try { return JSON.parse(localStorage.getItem(checkKey(id)) || '[]'); } catch { return []; }
}
function toggleCheck(id, item, el) {
  const arr = getSermonChecklist(id);
  const idx = arr.indexOf(item);
  if (idx > -1) arr.splice(idx, 1); else arr.push(item);
  localStorage.setItem(checkKey(id), JSON.stringify(arr));
  const done = arr.includes(item);
  el.classList.toggle('done', done);
  el.querySelector('.check-box').textContent = done ? '✓' : '';
  el.querySelector('.check-label').style.textDecoration = done ? 'line-through' : '';
}

// ============================================================
//  PRINT VIEW
// ============================================================
function printSermon(id) {
  const s = cache.sermons.find(x => x.id === id); if (!s) return;
  const vss    = (s.scriptures || '').split('\n').filter(Boolean);
  const quotes = getSermonQuotes(id);

  // Parse WWH + notes
  let wwhPrint = '', notesPrint = '';
  try {
    const n = s.notes ? JSON.parse(s.notes) : null;
    if (n?._wwh) {
      if (n.what || n.why || n.how) {
        wwhPrint = `
          <div class="print-section-label" style="margin-top:36px;">What, Why &amp; How</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px;">
            ${n.what?`<div style="border:1px solid #eee;border-radius:6px;padding:10px 12px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#185FA5;margin-bottom:5px;">What</div><div style="font-size:13px;line-height:1.65;">${esc(n.what)}</div></div>`:''}
            ${n.why ?`<div style="border:1px solid #eee;border-radius:6px;padding:10px 12px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#8B3A8B;margin-bottom:5px;">Why</div><div style="font-size:13px;line-height:1.65;">${esc(n.why)}</div></div>`:''}
            ${n.how ?`<div style="border:1px solid #eee;border-radius:6px;padding:10px 12px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#2E7D32;margin-bottom:5px;">How</div><div style="font-size:13px;line-height:1.65;">${esc(n.how)}</div></div>`:''}
          </div>`;
      }
      if (n.notes) notesPrint = `<div class="print-section-label">Notes</div><div class="print-content">${esc(n.notes)}</div>`;
    } else if (s.notes) {
      notesPrint = `<div class="print-section-label">Notes</div><div class="print-content">${esc(s.notes)}</div>`;
    }
  } catch { if (s.notes) notesPrint = `<div class="print-section-label">Notes</div><div class="print-content">${esc(s.notes)}</div>`; }

  // Parse structured outline
  let introPrint = '', pointsPrint = '', conclusionPrint = '';
  try {
    const o = s.outline ? JSON.parse(s.outline) : null;
    if (o?._structured) {
      if (o.intro) introPrint = `<div class="print-section-label">Introduction</div><div class="print-content" style="margin-bottom:20px;">${esc(o.intro)}</div>`;
      if (o.points?.some(p => p.title || p.topics?.some(t=>t.text))) {
        o.points.forEach((p, pi) => {
          if (!p.title && !p.topics?.some(t=>t.text)) return;
          // page-break-inside:avoid keeps the whole point together;
          // page-break-after:auto means the browser breaks AFTER it if needed
          let html = `<div class="print-point-block">`;
          html += `<div style="font-size:17px;font-weight:700;margin-bottom:12px;"><span style="color:#185FA5;margin-right:8px;">${String.fromCharCode(65+pi)}.</span>${esc(p.title||'')}</div>`;
          (p.topics||[]).forEach((t, ti) => {
            if (!t.text) return;
            html += `<div style="margin-left:18px;margin-bottom:8px;"><div style="font-size:15px;font-weight:500;">${ti+1}. ${esc(t.text)}${t.ref?` <span style="color:#185FA5;font-size:12px;font-weight:400;">(${esc(t.ref)})</span>`:''}</div>`;
            (t.subtopics||[]).forEach(st => {
              if (!st.text) return;
              html += `<div style="margin-left:24px;font-size:13px;color:#444;margin-top:3px;">— ${esc(st.text)}${st.ref?` <span style="color:#185FA5;font-size:11px;">(${esc(st.ref)})</span>`:''}</div>`;
            });
            html += `</div>`;
          });
          html += `</div>`;
          pointsPrint += html;
        });
      }
      if (o.conclusion) conclusionPrint = `<div class="print-point-block"><div class="print-section-label" style="margin-top:0;">Conclusion</div><div class="print-content">${esc(o.conclusion)}</div></div>`;
      if (o.legacyOutline) pointsPrint += `<div class="print-content">${esc(o.legacyOutline)}</div>`;
    } else if (s.outline) {
      pointsPrint = `<div class="print-content">${esc(s.outline)}</div>`;
    }
  } catch { if (s.outline) pointsPrint = `<div class="print-content">${esc(s.outline)}</div>`; }

  const pv = document.getElementById('print-view');
  pv.innerHTML = `
    <!-- PAGE 1: Title + What/Why/How + Scriptures, then force a page break -->
    <div class="print-page-1">
      <div class="print-sermon-title">${esc(s.title)}</div>
      ${wwhPrint}
      ${vss.length ? `<div class="print-section-label" style="margin-top:28px;">Scriptures</div>${vss.map(v=>`<div class="print-scripture-block">${esc(v)}</div>`).join('')}` : ''}
    </div>

    <!-- PAGE 2+: Outline, notes, quotes — flows naturally,
         page breaks happen only after a complete point, never mid-point -->
    <div class="print-content-pages">
      ${introPrint}
      ${pointsPrint ? `<div class="print-section-label">Main Points</div>${pointsPrint}` : ''}
      ${conclusionPrint}
      ${notesPrint}
      ${quotes.length ? `<div class="print-section-label">Key Quotes</div>${quotes.map(q=>`<div class="print-quote">${esc(q)}</div>`).join('')}` : ''}
    </div>
  `;
  closeModal();
  window.print();
}

// ============================================================
//  PREACHING MODE
// ============================================================
let preachInterval = null;
let preachSeconds  = 0;
let preachRunning  = false;
let preachSections = [];
let preachFocusIdx = -1;
let preachSermonId = null;

function openPreachingMode(id) {
  const s = cache.sermons.find(x => x.id === id); if (!s) return;
  const vss = (s.scriptures || '').split('\n').filter(Boolean);
  const quotes = getSermonQuotes(id);
  closeModal();

  preachSermonId = id;
  preachSections = [];
  preachFocusIdx = -1;

  document.getElementById('preach-title-label').textContent = s.title;
  preachSeconds = 0; preachRunning = false;
  document.getElementById('preach-timer').textContent = '0:00';
  document.getElementById('preach-timer-btn').textContent = '▶ Start';
  loadPreachTranslation();

  // Parse data
  let outline = null, notesData = null;
  try { outline = s.outline ? JSON.parse(s.outline) : null; } catch {}
  try { notesData = s.notes ? JSON.parse(s.notes) : null; } catch {}

  // Build sections list for focus popup & nav
  if (outline?._structured) {
    if (outline.intro) preachSections.push({ type:'intro', label:'Introduction', data: outline.intro });
    (outline.points||[]).forEach((p, pi) => {
      if (p.title || p.topics?.some(t=>t.text))
        preachSections.push({ type:'point', label:`${String.fromCharCode(65+pi)}. ${p.title||'(untitled)'}`, data: p, index: pi, quotes });
    });
    if (outline.conclusion) preachSections.push({ type:'conclusion', label:'Conclusion', data: outline.conclusion });
  }

  // LEFT PANE
  let leftHTML = '';
  if (vss.length) {
    leftHTML += `<div class="preach-section-label" style="margin-bottom:8px;">Scriptures</div>`;
    vss.forEach(v => leftHTML += `<div class="preach-scripture" onclick="showScripturePopup(this)" data-ref="${esc(v)}">${esc(v)}</div>`);
  }
  if (preachSections.length) {
    leftHTML += `<div class="preach-section-label" style="margin-top:20px;margin-bottom:8px;">Sections — tap to focus</div>`;
    preachSections.forEach((sec, idx) => {
      const icon = sec.type==='point' ? String.fromCharCode(65+sec.index)+'.' : '▸';
      leftHTML += `<button class="preach-nav-btn" id="preach-nav-${idx}" onclick="openFocusPopup(${idx})"><span class="preach-nav-icon">${icon}</span><span>${esc(sec.label)}</span></button>`;
    });
  }
  if (!vss.length && !preachSections.length) leftHTML = `<p style="color:rgba(240,239,232,0.22);font-size:13px;line-height:1.6;">No scriptures or sections yet.</p>`;
  document.getElementById('preach-left').innerHTML = leftHTML;

  // RIGHT PANE — full outline
  let rightHTML = '';
  if (notesData?._wwh && (notesData.what||notesData.why||notesData.how)) {
    rightHTML += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:32px;">`;
    if (notesData.what) rightHTML += `<div style="background:rgba(24,95,165,0.12);border-radius:8px;padding:12px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(168,207,238,0.5);margin-bottom:6px;">What</div><div style="font-size:14px;color:rgba(240,239,232,0.8);line-height:1.6;">${esc(notesData.what)}</div></div>`;
    if (notesData.why)  rightHTML += `<div style="background:rgba(139,58,139,0.12);border-radius:8px;padding:12px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(210,168,210,0.5);margin-bottom:6px;">Why</div><div style="font-size:14px;color:rgba(240,239,232,0.8);line-height:1.6;">${esc(notesData.why)}</div></div>`;
    if (notesData.how)  rightHTML += `<div style="background:rgba(46,125,50,0.12);border-radius:8px;padding:12px 14px;"><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(168,210,168,0.5);margin-bottom:6px;">How</div><div style="font-size:14px;color:rgba(240,239,232,0.8);line-height:1.6;">${esc(notesData.how)}</div></div>`;
    rightHTML += `</div>`;
  }
  if (quotes.length) {
    rightHTML += `<div class="preach-section-label" style="margin-bottom:12px;">Key Quotes</div>`;
    quotes.forEach(q => rightHTML += `<div class="preach-highlight">${esc(q)}</div>`);
    rightHTML += `<div style="margin-bottom:32px;"></div>`;
  }
  if (outline?._structured) {
    if (outline.intro) rightHTML += `<div class="preach-section-label" style="margin-bottom:10px;">Introduction</div><div class="preach-outline" style="margin-bottom:28px;">${esc(outline.intro)}</div>`;
    if (outline.points?.some(p=>p.title||p.topics?.some(t=>t.text))) {
      rightHTML += `<div class="preach-section-label" style="margin-bottom:14px;">Main Points</div>`;
      outline.points.forEach((p,pi) => {
        if (!p.title && !p.topics?.some(t=>t.text)) return;
        rightHTML += `<div style="margin-bottom:28px;"><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:12px;"><span style="font-size:32px;font-weight:700;color:rgba(74,158,232,0.55);min-width:36px;line-height:1.2;">${String.fromCharCode(65+pi)}.</span><span style="font-size:26px;font-weight:600;color:#f0efe8;line-height:1.3;">${esc(p.title||'')}</span></div>`;
        (p.topics||[]).forEach((t,ti) => {
          if (!t.text) return;
          rightHTML += `<div style="margin-left:48px;margin-bottom:10px;"><div style="display:flex;align-items:baseline;gap:10px;"><span style="font-size:18px;font-weight:600;color:rgba(168,207,238,0.5);min-width:22px;">${ti+1}.</span><div><span style="font-size:20px;color:#f0efe8;line-height:1.6;">${esc(t.text)}</span>${t.ref?`<span class="focus-ref-chip" onclick="previewRefText('${esc(t.ref)}')">${esc(t.ref)}</span>`:''}</div></div>`;
          (t.subtopics||[]).forEach(st => {
            if (!st.text) return;
            rightHTML += `<div style="margin-left:32px;margin-top:6px;display:flex;align-items:baseline;gap:8px;"><span style="color:rgba(240,239,232,0.3);font-size:16px;min-width:18px;">—</span><div><span style="font-size:17px;color:rgba(240,239,232,0.65);line-height:1.6;">${esc(st.text)}</span>${st.ref?`<span class="focus-ref-chip" style="font-size:11px;" onclick="previewRefText('${esc(st.ref)}')">${esc(st.ref)}</span>`:''}</div></div>`;
          });
          rightHTML += `</div>`;
        });
        rightHTML += `</div>`;
      });
    }
    if (outline.conclusion) rightHTML += `<div class="preach-section-label" style="margin-bottom:10px;">Conclusion</div><div class="preach-outline">${esc(outline.conclusion)}</div>`;
  } else if (s.outline) {
    rightHTML += `<div class="preach-section-label" style="margin-bottom:12px;">Outline</div><div class="preach-outline">${esc(s.outline)}</div>`;
  }
  const notesText = notesData?._wwh ? notesData.notes : (typeof s.notes==='string'&&!s.notes.startsWith('{') ? s.notes : '');
  if (notesText) rightHTML += `<div class="preach-section-label" style="margin-top:32px;margin-bottom:12px;">Notes</div><div class="preach-notes">${esc(notesText)}</div>`;
  if (!rightHTML) rightHTML = `<p style="color:rgba(240,239,232,0.3);font-size:18px;">No outline or notes yet. Add content first.</p>`;
  document.getElementById('preach-right').innerHTML = rightHTML;
  document.getElementById('preaching-mode').classList.add('active');
}

// ============================================================
//  FOCUS POPUP — section drill-down with prev/next
// ============================================================
let focusCurrentIdx = -1;

function openFocusPopup(idx) {
  focusCurrentIdx = idx;
  renderFocusPopup();
  document.getElementById('preach-focus-popup').classList.add('active');
  // Highlight active nav button
  document.querySelectorAll('.preach-nav-btn').forEach((b,i) => b.classList.toggle('focused', i===idx));
}

function closeFocusPopup(e) {
  if (e && e.target !== document.getElementById('preach-focus-popup')) return;
  document.getElementById('preach-focus-popup').classList.remove('active');
  document.querySelectorAll('.preach-nav-btn').forEach(b => b.classList.remove('focused'));
  focusCurrentIdx = -1;
}

function focusStep(dir) {
  const next = focusCurrentIdx + dir;
  if (next < 0 || next >= preachSections.length) return;
  focusCurrentIdx = next;
  renderFocusPopup();
  document.querySelectorAll('.preach-nav-btn').forEach((b,i) => b.classList.toggle('focused', i===focusCurrentIdx));
}

function renderFocusPopup() {
  const sec = preachSections[focusCurrentIdx];
  if (!sec) return;
  const total = preachSections.length;
  document.getElementById('focus-counter').textContent = `${focusCurrentIdx+1} / ${total}`;
  document.getElementById('focus-prev-btn').disabled = focusCurrentIdx === 0;
  document.getElementById('focus-next-btn').disabled = focusCurrentIdx === total-1;

  let html = '';
  if (sec.type === 'intro') {
    html += `<div class="focus-section-type">Introduction</div>`;
    html += `<div class="focus-intro-text">${esc(sec.data)}</div>`;
  } else if (sec.type === 'conclusion') {
    html += `<div class="focus-section-type">Conclusion</div>`;
    html += `<div class="focus-intro-text">${esc(sec.data)}</div>`;
  } else if (sec.type === 'point') {
    const p = sec.data;
    html += `<div class="focus-section-type">Main Point ${String.fromCharCode(65+sec.index)}</div>`;
    html += `<div class="focus-point-title">${esc(p.title||'(untitled)')}</div>`;
    (p.topics||[]).forEach((t, ti) => {
      if (!t.text) return;
      html += `<div class="focus-topic-row">
        <span class="focus-topic-num">${ti+1}.</span>
        <div>
          <span class="focus-topic-text">${esc(t.text)}</span>
          ${t.ref ? `<span class="focus-ref-chip" onclick="previewRefText('${esc(t.ref)}')">${esc(t.ref)}</span>` : ''}
          ${(t.subtopics||[]).filter(st=>st.text).map(st=>`
            <div class="focus-subtopic-row">
              <span class="focus-subtopic-dash">—</span>
              <div>
                <span class="focus-subtopic-text">${esc(st.text)}</span>
                ${st.ref ? `<span class="focus-ref-chip" style="font-size:12px;" onclick="previewRefText('${esc(st.ref)}')">${esc(st.ref)}</span>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });
    // Key quotes for this sermon
    if (sec.quotes?.length) {
      html += `<hr class="focus-quotes-divider">`;
      sec.quotes.forEach(q => html += `<div class="focus-quote-block">${esc(q)}</div>`);
    }
  }
  document.getElementById('focus-popup-body').innerHTML = html;
  document.getElementById('focus-popup-body').scrollTop = 0;
}

function savePreachTranslation() {
  const val = document.getElementById('preach-translation').value;
  localStorage.setItem('mh_preach_translation', val);
}

function loadPreachTranslation() {
  const saved = localStorage.getItem('mh_preach_translation') || 'kjv';
  const sel = document.getElementById('preach-translation');
  if (sel) sel.value = saved;
}

async function showScripturePopup(el) {
  const ref = (el.dataset?.ref || el).trim();
  const textEl = document.getElementById('preach-popup-text');
  const refEl  = document.getElementById('preach-popup-ref');

  textEl.innerHTML = `<span class="loading-verse">Loading ${esc(ref)}…</span>`;
  refEl.textContent = ref;
  document.getElementById('preach-scripture-popup').classList.add('active');

  const translation = document.getElementById('preach-translation')?.value || 'kjv';
  const passage = ref.replace(/\b(KJV|NIV|ESV|NKJV|NLT|NASB|MSG|AMP|CSB|RSV|WEB|WEBBE|OEB)\b/i, '').trim();
  const cacheKey = `mh_verse_${passage.toLowerCase().replace(/\s+/g,'_')}_${translation}`;

  // Try offline cache first
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    const c = JSON.parse(cached);
    refEl.textContent = c.label;
    textEl.innerHTML  = c.html;
    return;
  }

  try {
    const url = `https://bible-api.com/${encodeURIComponent(passage)}?translation=${translation}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`API error ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    let html = '';
    if (data.verses?.length > 1) {
      data.verses.forEach(v => { html += `<sup class="verse-num">${v.verse}</sup>${esc(v.text.trim())} `; });
    } else {
      html = esc((data.text||'').trim());
    }
    const sel = document.getElementById('preach-translation');
    const transLabel = sel?.options[sel.selectedIndex]?.text.split('—')[0].trim() || translation.toUpperCase();
    const label = `${passage} — ${transLabel}`;
    refEl.textContent = label;
    textEl.innerHTML  = html;
    // Cache for offline use
    try { localStorage.setItem(cacheKey, JSON.stringify({ html, label })); } catch {}
  } catch {
    textEl.innerHTML = `<span class="error-verse">Could not load verse. Check your connection, or verify the reference (e.g. "Luke 1:28-33"). Previously loaded verses work offline.</span>`;
  }
}

// ---- Preview scripture reference by text value (used in detail view & preaching mode) ----
function previewRefText(ref) {
  const fakeEl = { dataset: { ref: ref } };
  showScripturePopup(fakeEl);
}

function closeScripturePopup(e) {
  if (e && e.target !== document.getElementById('preach-scripture-popup')) return;
  document.getElementById('preach-scripture-popup').classList.remove('active');
}

function closePreachingMode() {
  clearInterval(preachInterval);
  preachInterval = null; preachRunning = false;
  document.getElementById('preaching-mode').classList.remove('active');
}

function togglePreachTimer() {
  preachRunning = !preachRunning;
  document.getElementById('preach-timer-btn').textContent = preachRunning ? '⏸ Pause' : '▶ Resume';
  if (preachRunning) {
    preachInterval = setInterval(() => {
      preachSeconds++;
      const m = Math.floor(preachSeconds / 60);
      const s = preachSeconds % 60;
      document.getElementById('preach-timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);
  } else {
    clearInterval(preachInterval);
  }
}

function resetPreachTimer() {
  clearInterval(preachInterval);
  preachSeconds = 0; preachRunning = false;
  document.getElementById('preach-timer').textContent = '0:00';
  document.getElementById('preach-timer-btn').textContent = '▶ Start';
}

// ============================================================
//  EXPORT TO WORD (.docx via docx CDN)
// ============================================================
async function exportSermonsDocx() {
  const items = cache.sermons;
  if (!items.length) { toast('No sermons to export'); return; }
  toast('Building Word document…');

  // Load docx library from CDN
  if (!window.docx) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/docx@8/build/index.umd.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, PageBreak } = window.docx;
  const children = [];

  // Cover title
  children.push(new Paragraph({
    text: 'Sermon Archive',
    heading: HeadingLevel.TITLE,
    alignment: AlignmentType.CENTER,
    spacing: { after: 200 }
  }));
  children.push(new Paragraph({
    children: [new TextRun({ text: `Exported ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`, color:'666666', size: 22 })],
    alignment: AlignmentType.CENTER,
    spacing: { after: 600 }
  }));

  items.forEach((s, idx) => {
    if (idx > 0) {
      children.push(new Paragraph({ children: [new PageBreak()] }));
    }
    // Sermon title
    children.push(new Paragraph({
      text: s.title,
      heading: HeadingLevel.HEADING_1,
      spacing: { before: 0, after: 120 }
    }));
    // Meta line
    const metaParts = [];
    if (s.date) metaParts.push(fmtDate(s.date));
    metaParts.push(`Status: ${s.status || 'draft'}`);
    children.push(new Paragraph({
      children: [new TextRun({ text: metaParts.join('  |  '), color: '888888', size: 20 })],
      spacing: { after: 240 }
    }));

    // Checklist
    const checkItems = ['Introduction','Main Point','Illustration','Application','Call to Action','Closing Prayer'];
    const checks = getSermonChecklist(s.id);
    children.push(new Paragraph({ text: 'CHECKLIST', heading: HeadingLevel.HEADING_2, spacing: { before: 200, after: 80 } }));
    checkItems.forEach(item => {
      const done = checks.includes(item);
      children.push(new Paragraph({
        children: [new TextRun({ text: `${done ? '☑' : '☐'}  ${item}`, size: 22 })],
        spacing: { after: 60 }
      }));
    });

    // Scriptures
    if (s.scriptures) {
      children.push(new Paragraph({ text: 'SCRIPTURES', heading: HeadingLevel.HEADING_2, spacing: { before: 200, after: 80 } }));
      s.scriptures.split('\n').filter(Boolean).forEach(v => {
        children.push(new Paragraph({
          children: [new TextRun({ text: v, italics: true, color: '185FA5', size: 22 })],
          spacing: { after: 80 },
          indent: { left: 360 }
        }));
      });
    }

    // Outline
    if (s.outline) {
      children.push(new Paragraph({ text: 'OUTLINE', heading: HeadingLevel.HEADING_2, spacing: { before: 200, after: 80 } }));
      s.outline.split('\n').forEach(line => {
        children.push(new Paragraph({ children: [new TextRun({ text: line || ' ', size: 22 })], spacing: { after: 60 } }));
      });
    }

    // Notes
    if (s.notes) {
      children.push(new Paragraph({ text: 'NOTES', heading: HeadingLevel.HEADING_2, spacing: { before: 200, after: 80 } }));
      s.notes.split('\n').forEach(line => {
        children.push(new Paragraph({ children: [new TextRun({ text: line || ' ', size: 22 })], spacing: { after: 60 } }));
      });
    }

    // Key Quotes
    const quotes = getSermonQuotes(s.id);
    if (quotes.length) {
      children.push(new Paragraph({ text: 'KEY QUOTES', heading: HeadingLevel.HEADING_2, spacing: { before: 200, after: 80 } }));
      quotes.forEach(q => {
        children.push(new Paragraph({
          children: [new TextRun({ text: `"${q}"`, italics: true, bold: true, color: '8B5E00', size: 24 })],
          spacing: { after: 120 },
          indent: { left: 360 }
        }));
      });
    }
  });

  const doc = new Document({
    styles: {
      default: { document: { run: { font: 'Arial', size: 22 } } },
      paragraphStyles: [
        { id: 'Title', name: 'Title', run: { font: 'Arial', size: 48, bold: true, color: '185FA5' }, paragraph: { spacing: { after: 240 } } },
        { id: 'Heading1', name: 'Heading 1', basedOn: 'Normal', next: 'Normal', run: { font: 'Arial', size: 32, bold: true, color: '1A1A2E' }, paragraph: { spacing: { before: 240, after: 120 }, outlineLevel: 0 } },
        { id: 'Heading2', name: 'Heading 2', basedOn: 'Normal', next: 'Normal', run: { font: 'Arial', size: 22, bold: true, color: '66667A', allCaps: true }, paragraph: { spacing: { before: 200, after: 80 }, outlineLevel: 1 } },
      ]
    },
    sections: [{
      properties: { page: { size: { width: 12240, height: 15840 }, margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 } } },
      children
    }]
  });

  const blob = await Packer.toBlob(doc);
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'sermons.docx';
  a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded sermons.docx!');
}

// ---- START ----
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('preach-scripture-popup').classList.contains('active')) {
      document.getElementById('preach-scripture-popup').classList.remove('active');
    } else if (document.getElementById('preach-focus-popup').classList.contains('active')) {
      closeFocusPopup();
    } else if (document.getElementById('preaching-mode').classList.contains('active')) {
      closePreachingMode();
    }
  }
  // Left/Right arrow keys to step through sections while focus popup is open
  if (document.getElementById('preach-focus-popup').classList.contains('active')) {
    if (e.key === 'ArrowRight') focusStep(1);
    if (e.key === 'ArrowLeft')  focusStep(-1);
  }
});
init();
</script>
</body>
</html>
